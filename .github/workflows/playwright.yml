name: Nightly Playwright Dev Tests
on:
  pull_request:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
  issue_comment:

jobs:
  e2e-nightly-test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
#    - name: Install dependencies
#      run: npm install -g pnpm && pnpm install
#    - name: Install Playwright Browsers
#      working-directory: ./frontend
#      run: pnpm exec playwright install --with-deps
    - name: Set up environment variables
      run: |
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> $GITHUB_ENV
        echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> $GITHUB_ENV
        echo "E2E_TEST_BASE_URL=${{ vars.E2E_TEST_BASE_URL }}" >> $GITHUB_ENV
        echo "NODE_ENV=${{ vars.NODE_ENV }}" >> $GITHUB_ENV
        printenv
    - name: Print environment variables (for debugging)
      run: |
        echo "E2E_TEST_BASE_URL is $E2E_TEST_BASE_URL"
        echo "SUPABASE_URL is $SUPABASE_URL"

